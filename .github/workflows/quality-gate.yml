name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-web:
    name: local quality gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-audit
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048
        with:
          tool: cargo-deny

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install system gate dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck

      - name: Full quality gate and Browser wizard E2E
        env:
          G7_WEB_E2E: "1"
        run: |
          shellcheck scripts/*.sh
          bash scripts/quality-gate.sh

  msrv:
    name: Rust 1.85 compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.85.0

      - name: Check workspace MSRV
        run: |
          cargo check --locked --workspace --all-targets

  release-dry-run:
    name: release artifact dry run
    needs: [rust-and-web, msrv]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Build release artifacts
        run: bash scripts/build-release-assets.sh

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: g7inst-release-dry-run
          path: dist/release/
          if-no-files-found: error
