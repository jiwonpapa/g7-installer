name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-audit
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@0078e077a097102105e114583eda727499056048
        with:
          tool: cargo-deny

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install system gate dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck

      - name: Verify tag matches crate version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/g7-cli/Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${version}"
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = "tag"

      - name: Verify tagged source
        env:
          G7_WEB_E2E: "1"
        run: |
          shellcheck scripts/*.sh
          bash scripts/quality-gate.sh

      - name: Build checksummed assets and SBOM
        run: bash scripts/build-release-assets.sh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="${GITHUB_REF_NAME}"
          release_args=()
          if [[ "${GITHUB_REF_NAME}" == *-beta.* ]]; then
            title="${GITHUB_REF_NAME} - Public Beta"
            release_args+=(--prerelease)
          elif [[ "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            title="${GITHUB_REF_NAME} - Release Candidate"
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/release/* \
            --verify-tag \
            --generate-notes \
            --title "${title}" \
            "${release_args[@]}"

      - name: Verify release channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          is_prerelease="$(gh release view "${GITHUB_REF_NAME}" --json isPrerelease --jq .isPrerelease)"
          if [[ "${GITHUB_REF_NAME}" == *-beta.* || "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            test "${is_prerelease}" = "true"
          else
            test "${is_prerelease}" = "false"
          fi
