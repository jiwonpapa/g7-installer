name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Verify tag matches crate version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/g7-cli/Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${version}"
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = "tag"

      - name: Verify tagged source
        run: |
          cargo test --locked --workspace
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo doc --locked --workspace --no-deps

      - name: Build checksummed assets and SBOM
        run: bash scripts/build-release-assets.sh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v2
        with:
          subject-path: dist/release/*

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/release/* --verify-tag --generate-notes
